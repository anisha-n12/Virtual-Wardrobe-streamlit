{% extends "base.html" %}
{% block title %}Virtual Try-On{% endblock %}

{% block content %}

<div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Start Your Virtual Try-On</h1>

  <form method="POST" action="{{ url_for('gradio_try_on') }}" enctype="multipart/form-data" class="space-y-6">

    <!-- Upload Outfit Image -->
    <div class="border-b pb-4">
      <label for="clothing_image" class="block text-lg font-medium text-gray-700 mb-2">
        1. Upload Outfit Image:
      </label>
      <input type="file" id="clothing_image" name="clothing_image" accept="image/*" required
             class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full
                    file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700
                    hover:file:bg-green-100">
      <small class="text-gray-500">
        Upload a clear image of the outfit (front view preferred).
      </small>
    </div>

    <!-- Upload Person Image -->
    <div class="border-b pb-4">
      <label for="person_photo" class="block text-lg font-medium text-gray-700 mb-2">
        2. Upload Photo of the Person:
      </label>
      <input type="file" id="person_photo" name="person_photo" accept="image/*" required
             class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full
                    file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700
                    hover:file:bg-indigo-100">
      <small class="text-gray-500">
        For best results: full body, centered, simple background.
      </small>
    </div>

    <!-- Submit Button -->
    <button type="submit"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm
                   text-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700
                   focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500
                   transition duration-150">
      🪄 Generate Virtual Try-On
    </button>

  </form>
</div>

{% endblock %}
